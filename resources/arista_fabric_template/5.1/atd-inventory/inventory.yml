---
# arista_fabric_template
all:
  children:
    cv_servers:
      hosts:
        cv_atd1:
          ansible_host: 192.168.0.5
          cv_collection: v3
    ATD_MGMT:
      children:
        ISN_WAN_ROUTER:
          children:
            DC1_WAN_ROUTERS:
              hosts:
                s1-core1:
                  type: super-spine
                  ansible_host: 192.168.0.102
                s1-core2:
                  type: super-spine
                  ansible_host: 192.168.0.103
            DC2_WAN_ROUTERS:
              hosts:
                s2-core1:
                  type: super-spine
                  ansible_host: 192.168.0.202
                s2-core2:
                  type: super-spine
                  ansible_host: 192.168.0.203


        ATD_DC1_FABRIC: #== XXX_FABRIC
          children:
            ATD_DC1_SPINES: #== XXX_SPINES
#              vars:
#                type: spine
              hosts:
                s1-spine1: #== s1-spine1 hostname
                  type: spine
                  ansible_host: 192.168.0.10 #== s1-spine1 mgmt ip
                s1-spine2: #== s1-spine2 hostname
                  type: spine
                  ansible_host: 192.168.0.11 #== s1-spine2 mgmt ip
            ATD_DC1_LEAFS: #== XXX_LEAFS
#              vars:
#                type: l3leaf
              children:
                pod1:
                  hosts:
                    s1-leaf1: #== s1-leaf1 hostname
                      type: l3leaf
                      ansible_host: 192.168.0.12 #== s1-leaf1 mgmt ip
                    s1-leaf2: #== s1-leaf2 hostname
                      type: l3leaf
                      ansible_host: 192.168.0.13 #== s1-leaf2 mgmt ip
                pod2:
                  hosts:
                    s1-leaf3: #== s1-leaf3 hostname
                      type: l3leaf
                      ansible_host: 192.168.0.14  #== s1-leaf3 mgmt ip
                    s1-leaf4: #== s1-leaf4 hostname
                      type: l3leaf
                      ansible_host: 192.168.0.15  #== s1-leaf4 mgmt ip
            ATD_DC1_BORDER_LEAFS_GW: #== XXX_BORDER_LEAFS_GW
              vars:
                evpn_overlay_bgp_rtc: true
              hosts:
                s1-brdr1:
                  type: l3leaf
                  ansible_host: 192.168.0.100
                s1-brdr2:
                  type: l3leaf
                  ansible_host: 192.168.0.101



        ATD_DC2_FABRIC:
          children:
            ATD_DC2_SPINES:
              hosts:
                s2-spine1:
                  type: spine
                  ansible_host: 192.168.0.20
                s2-spine2:
                  type: spine
                  ansible_host: 192.168.0.21
            ATD_DC2_LEAFS:
              children:
                pod21:
                  hosts:
                    s2-leaf1:
                      type: l3leaf
                      ansible_host: 192.168.0.122
                    s2-leaf2:
                      type: l3leaf
                      ansible_host: 192.168.0.123
                pod22:
                  hosts:
                    s2-leaf3:
                      type: l3leaf
                      ansible_host: 192.168.0.124
                    s2-leaf4:
                      type: l3leaf
                      ansible_host: 192.168.0.125    
            ATD_DC2_BORDER_LEAFS_GW:
              vars:
                evpn_overlay_bgp_rtc: true
              hosts:
                s2-brdr1:
                  type: l3leaf
                  ansible_host: 192.168.0.200
                s2-brdr2:
                  type: l3leaf
                  ansible_host: 192.168.0.201

    ATD_MSD_1:
      children:
        ISN_WAN_ROUTER:
        ATD_DC1_FABRIC: #== XXX_FABRIC
        ATD_DC2_FABRIC: #== XXX_FABRIC

    ATD_TENANTS_NETWORKS:
      children:
        ATD_DC1_LEAFS:  #== XXX_LEAFS
        ATD_DC2_LEAFS:  #== XXX_LEAFS
        ATD_DC1_BORDER_LEAFS_GW: #== XXX_BORDER_LEAFS_GW
        ATD_DC2_BORDER_LEAFS_GW: #== XXX_BORDER_LEAFS_GW
    ATD_MLAG_PORT:
      children:
        ATD_DC1_LEAFS: #== XXX_LEAFS
        ATD_DC2_LEAFS: #== XXX_LEAFS
    ATD_PORT_PROFILES:
       children:
        ATD_DC1_LEAFS: #== XXX_LEAFS
        ATD_DC2_LEAFS: #== XXX_LEAFS


  vars:
    ansible_user: arista #== switch and CVP username
    ansible_password: arista90vr #== switch and CVP password
    
#    ansible_password: "{{ lookup('env', 'LABPASSPHRASE') }}"
    ansible_network_os: arista.eos.eos
    # Configure privilege escalation
    ansible_become: true
    ansible_become_method: enable
    # HTTPAPI configuration
    ansible_connection: httpapi
    ansible_httpapi_port: 443
    ansible_httpapi_use_ssl: true
    ansible_httpapi_validate_certs: false
    ansible_python_interpreter: $(which python3)